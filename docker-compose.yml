services:
  postgres:
    image: postgres:16-alpine
    container_name: laws-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-laws}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-laws_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-laws}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - laws_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-laws} -d ${POSTGRES_DB:-laws}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: laws-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - laws_redis_data:/data

volumes:
  laws_postgres_data:
  laws_redis_data:
