            row.cells.forEach(function (cell) {
              if (cell !== null && cell.passed !== null) { totalCount++; if (cell.passed === true) totalPass++; }
            });
          });
          h += '<td><div class="eval-summary-name">';
          h += '<span class="expand-toggle">\u25B6</span>';
          h += esc(evalName);
          h += '<span class="group-count">(' + rows.length + ')</span>';
          h += '</div></td>';

          // Per-iteration summary cells: dots for each assertion + pass count
          var ratePerIter = iters.map(function(it, ii) {
            var p = 0, t = 0;
            rows.forEach(function(row) { var c = row.cells[ii]; if (c !== null && c.passed !== null) { t++; if (c.passed === true) p++; } });
            return t > 0 ? p / t : null;
          });

          iters.forEach(function (it, ii) {
            var iterPass = 0, iterTotal = 0;
            h += '<td><div style="display:flex;flex-direction:column;align-items:center;gap:3px;">';
            // Dot row
            h += '<div class="summary-dots">';
            rows.forEach(function (row) {
              var cell = row.cells[ii];
              if (cell === null) {
                h += '<span class="summary-dot dot-na"></span>';
              } else {
                iterTotal++;
                if (cell.passed === true) { iterPass++; h += '<span class="summary-dot dot-pass"></span>'; }
                else if (cell.passed === null) { h += '<span class="summary-dot dot-neutral"></span>'; }
                else { h += '<span class="summary-dot dot-fail"></span>'; }
              }
            });
            h += '</div>';
            // Pass count label
            if (iterTotal > 0) {
              var rateCls = iterPass === iterTotal ? ' all-pass' : (iterPass === 0 ? ' all-fail' : '');
              h += '<span class="summary-pass-rate' + rateCls + '">' + iterPass + '/' + iterTotal + '</span>';
            }
            h += '</div></td>';
          });

          // Rate column: final pass rate %
          var finalRate = null;
          for (var ri = ratePerIter.length - 1; ri >= 0; ri--) { if (ratePerIter[ri] !== null) { finalRate = ratePerIter[ri]; break; } }
          h += '<td style="text-align:center;">';
          if (finalRate !== null) {
            h += '<span style="color:' + rateColor(finalRate) + '; font-weight:700; font-family:var(--mono); font-size:0.875rem; text-shadow:' + rateGlow(finalRate) + ';">' + pct(finalRate) + '</span>';
          } else {
            h += '<span style="color:var(--text-dim);">--</span>';
          }
          h += '</td>';

          // Trend column: only when multiple iterations
          if (iters.length > 1) {
            var validRates = ratePerIter.filter(function(v) { return v !== null; });
            h += '<td>';
            if (validRates.length > 1) {
              h += '<div class="eval-table-sparkline">' + buildSparkline(ratePerIter, accentColor(finalRate)) + '</div>';
            }
            h += '</td>';
          }

          h += '</tr></tbody>';

          // Detail rows (hidden by default)
          h += '<tbody class="eval-detail-rows" id="' + detailId + '">';
          var evalPrompt = evalPrompts && evalPrompts[evalName];
          if (evalPrompt) {
            var colSpan = iters.length + 2 + (iters.length > 1 ? 1 : 0); // Eval + iterations + Rate + (Trend if multi)
            h += '<tr><td colspan="' + colSpan + '"><div class="eval-prompt-block">' + esc(evalPrompt) + '</div></td></tr>';
          }
          rows.forEach(function (row) {
            h += '<tr>';
            h += '<td><span class="assertion-text" title="' + esc(row.text) + '">' + esc(row.text) + '</span></td>';
            row.cells.forEach(function (cell) {
              if (cell === null) {
                h += '<td><span class="heatmap-cell heatmap-na">--</span></td>';
              } else {
                var cls = cell.passed === true ? 'heatmap-pass' : cell.passed === false ? 'heatmap-fail' : 'heatmap-neutral';
                var sym = cell.passed === true ? '\u2713' : cell.passed === false ? '\u2717' : '~';
                var tip = cell.evidence ? ' title="' + esc(cell.evidence) + '"' : '';
                h += '<td><span class="heatmap-cell ' + cls + '"' + tip + '>' + sym + '</span></td>';
              }
            });
            h += '</tr>';
          });
          h += '</tbody>';
        });

        h += '</table>';

        // Attach click handlers after DOM insertion via a self-invoking setup
        setTimeout(function () {
          var summaryRows = document.querySelectorAll('.eval-summary-row');
          summaryRows.forEach(function (row) {
            row.addEventListener('click', function () {
              var detailId = row.getAttribute('data-detail');
              var detail = document.getElementById(detailId);
              if (detail) {
                var isVisible = detail.classList.contains('visible');
                detail.classList.toggle('visible');
                row.classList.toggle('expanded');
              }
            });
          });
        }, 0);

        return h;
      }

      // ======== VERTICAL TIMELINE (replaces horizontal) ========
      function buildVerticalTimeline(iters) {
        var t = '<div class="v-timeline">';
        iters.forEach(function (it, idx) {
          var isLast = idx === iters.length - 1;
          var dotCls = isLast ? 'final' : (it.recommendation === 'continue' ? 'active' : '');
          t += '<div class="v-timeline-node">';
          t += '<div class="v-timeline-dot ' + dotCls + '"></div>';
          t += '<div class="v-timeline-body">';
          t += '<div class="v-timeline-label">Iteration ' + it.iteration;
          if (it.pass_rate != null) t += ' <span class="v-timeline-pill ' + rateClass(it.pass_rate) + '">' + pct(it.pass_rate) + '</span>';
          if (it.quality_score != null) t += ' <span class="v-timeline-pill quality">Q-' + it.quality_score.toFixed(1) + '</span>';
          t += '</div>';

          if (it.skill_changes && it.skill_changes.length > 0) {
            t += '<ul class="v-timeline-changes">';
            it.skill_changes.forEach(function (c) {
              t += '<li>' + esc(typeof c === 'string' ? c : (c.description || c.change || JSON.stringify(c))) + '</li>';
            });
            t += '</ul>';
          }
          t += '</div></div>';
        });
        t += '</div>';
        return t;
      }

      // Keep old function name for compat
      function buildTimeline(iters) {
        return buildVerticalTimeline(iters);
      }

      // ======== JUDGE SIGNALS ========
      function buildJudgeSignals(judge) {
        var h = '<div class="judge-signals">';

        // Signals
        var iconMap = { positive: '+', negative: '\u2212', neutral: '~' };
        (judge.signals || []).forEach(function(sig) {
          var cls = sig.verdict === 'positive' ? 'positive' : sig.verdict === 'negative' ? 'negative' : 'neutral';
          var icon = iconMap[cls] || '~';
          h += '<div class="judge-signal ' + cls + '">';
          h += '<div class="judge-signal-icon">' + icon + '</div>';
          h += '<div>';
          h += '<div class="judge-signal-label">' + esc(sig.label) + '</div>';
          h += '<div class="judge-signal-value">' + esc(sig.value) + '</div>';
          h += '</div></div>';
        });

        // Reasoning
        if (judge.reasoning) {
          h += '<div class="judge-prose-block">';
          h += '<div class="judge-prose-label">Reasoning</div>';
          h += '<div class="judge-prose-text">' + esc(judge.reasoning) + '</div>';
          h += '</div>';
        }

        // Remaining opportunities
        if (judge.remaining_opportunities && judge.remaining_opportunities.length > 0) {
          h += '<div class="judge-prose-block">';
          h += '<div class="judge-prose-label">Remaining Opportunities</div>';
          h += '<ul class="judge-prose-list">';
          judge.remaining_opportunities.forEach(function(op) {
            h += '<li>' + esc(op) + '</li>';
          });
          h += '</ul></div>';
        }

        // Risk of continuing
        if (judge.risk_of_continuing) {
          h += '<div class="judge-prose-block">';
          h += '<div class="judge-prose-label">Risk of Continuing</div>';
          h += '<div class="judge-prose-text">' + esc(judge.risk_of_continuing) + '</div>';
          h += '</div>';
        }

        h += '</div>';
        return h;
      }

      // ======== DESCRIPTION OPTIMIZATION ========
      function buildDescOpt(opt) {
        var d = '';
        d += '<div class="desc-compare">';
        d += '<div class="desc-box"><div class="desc-label">';
        d += '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="var(--text-dim)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="8" y1="12" x2="16" y2="12"/></svg>';
        d += ' BEFORE</div><div class="desc-text">' + esc(opt.original_description || 'N/A') + '</div></div>';
        d += '<div class="desc-box best"><div class="desc-label">';
        d += '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="var(--green-bright)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>';
        d += ' AFTER</div><div class="desc-text">' + esc(opt.best_description || 'N/A') + '</div></div>';
        d += '</div>';

        if (opt.history && opt.history.length > 0) {
          var hasTestCol = opt.history.some(function (h) { return h.test_total != null && h.test_total > 0; });
          var bestTrainRate = Math.max.apply(null, opt.history.map(function (h) {
            return h.train_total > 0 ? h.train_passed / h.train_total : 0;
          }));
          d += '<div class="desc-bar-chart">';
          d += '<div class="desc-bar-chart-title" style="display:flex;align-items:center;gap:0.75rem;">';
          d += '<span>Score per Iteration -</span>';
          d += '<span style="font-family:var(--mono);font-size:0.8125rem;font-weight:400;color:var(--gold);text-transform:none;letter-spacing:0;">' + esc(opt.best_score) + ' best score</span>';
          d += '</div>';
          // Column headers
          d += '<div class="desc-bar-row" style="margin-bottom:4px;">';
          d += '<div class="desc-bar-label"></div>';
          d += '<div style="flex:1;font-family:Poppins,sans-serif;font-size:0.75rem;color:var(--text-dim);letter-spacing:0.05em;">TRAIN</div>';
          d += '<div class="desc-bar-score" style="visibility:hidden;">0/0</div>';
          if (hasTestCol) {
            d += '<div style="flex:0.5;font-family:Poppins,sans-serif;font-size:0.75rem;color:var(--blue-dim,#4a90d9);letter-spacing:0.05em;">TEST</div>';
            d += '<div class="desc-bar-score" style="visibility:hidden;">0/0</div>';
          }
          d += '</div>';
          opt.history.forEach(function (h) {
            var trainRate = h.train_total > 0 ? h.train_passed / h.train_total : 0;
            var isBest = trainRate === bestTrainRate;
            var rowCls = isBest ? ' desc-bar-best' : '';
            var hasTest = h.test_passed != null && h.test_total != null && h.test_total > 0;
            d += '<div class="desc-bar-row' + rowCls + '">';
            d += '<div class="desc-bar-label">I' + h.iteration + '</div>';
            d += '<div class="desc-bar-track"><div class="desc-bar-fill train" style="width:' + (trainRate * 100) + '%;"></div></div>';
            d += '<div class="desc-bar-score">' + h.train_passed + '/' + h.train_total + '</div>';
            if (hasTest) {
              var testRate = h.test_passed / h.test_total;
              d += '<div class="desc-bar-track" style="flex:0.5;"><div class="desc-bar-fill test" style="width:' + (testRate * 100) + '%;"></div></div>';
              d += '<div class="desc-bar-score" style="color:var(--blue);min-width:2rem;">' + h.test_passed + '/' + h.test_total + '</div>';
            } else if (hasTestCol) {
              d += '<div style="flex:0.5;"></div><div class="desc-bar-score" style="min-width:2rem;"></div>';
            }
            d += '</div>';
          });
          d += '</div>';
        }
        return d;
      }

      // ======== RISKS ========
      function collectRisks(iters) {
        var risks = [];
        var lastIt = iters[iters.length - 1];
        if (!lastIt) return risks;
        // Check for regressions: compare last iteration with second-to-last
        if (iters.length >= 2) {
          var prevIt = iters[iters.length - 2];
          if (prevIt.per_eval && lastIt.per_eval) {
            Object.keys(lastIt.per_eval).forEach(function(name) {
              var currPe = lastIt.per_eval[name];
              var prevPe = (prevIt.per_eval || {})[name];
              if (prevPe && currPe.pass_rate != null && prevPe.pass_rate != null && currPe.pass_rate < prevPe.pass_rate) {
                risks.push({ level: 'error', text: 'Eval "' + name + '" regressed: ' + pct(prevPe.pass_rate) + ' \u2192 ' + pct(currPe.pass_rate) });
              }
            });
          }
        }
        if (lastIt.per_eval) {
          Object.keys(lastIt.per_eval).forEach(function (name) {
            var pe = lastIt.per_eval[name];
            if (pe.expectations) {
              pe.expectations.forEach(function (a) {
                if (!a.passed) risks.push({ level: 'warn', text: '[' + name + '] Expectation still failing: "' + a.text + '"' });
              });
            }
          });
        }
        if (lastIt.pass_rate != null && lastIt.pass_rate < 0.8) {
          risks.push({ level: 'warn', text: 'Final pass rate (' + pct(lastIt.pass_rate) + ') is below 80%. Further iteration may be needed.' });
        }
        return risks;
      }

    })();

  </script>

  <div class="vignette-overlay"></div>
  <div class="rolling-scan"></div>

</body>
