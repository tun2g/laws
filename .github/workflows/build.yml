##
## Build the laws images (api / web / admin) and push them to GHCR.
## All three are targets in devops/docker/Dockerfile, built from the repo root.
## The VPS releases by pulling :latest (chamee-devops ./deploy.sh pull).
##
## NEXT_PUBLIC_* (web) and VITE_* (admin) are baked at build time — set them as
## repo Variables:
##   vars.NEXT_PUBLIC_API_BASE_URL   e.g. https://api-laws.chamee.site/api
##   vars.NEXT_PUBLIC_BRAND_NAME     e.g. Laws
##   vars.VITE_API_BASE_URL          e.g. https://api-laws.chamee.site/api
##   vars.VITE_BRAND_NAME            e.g. Laws Admin
##

name: Build and push images

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: tun2g

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build · ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: api-runner
            image: laws-api
          - target: web-runner
            image: laws-web
          - target: admin-runner
            image: laws-admin
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: devops/docker/Dockerfile
          target: ${{ matrix.target }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image }}:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.image }}:sha-${{ github.sha }}
          # The build stage bakes all public args; runners ignore the ones they
          # don't use, so passing the full set for every target is harmless.
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ vars.NEXT_PUBLIC_API_BASE_URL }}
            NEXT_PUBLIC_BRAND_NAME=${{ vars.NEXT_PUBLIC_BRAND_NAME }}
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }}
            VITE_BRAND_NAME=${{ vars.VITE_BRAND_NAME }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
